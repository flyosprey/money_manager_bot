version: "3.8"


services:
  db:
    image: postgres:12-alpine
    volumes:
      - postgres-data:/var/lib/postgresql/data:rw
    env_file:
      - .env.prod
    expose:
      - 5432
    ports:
      - 127.0.0.1:${POSTGRES_PORT-5432}:5432
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $POSTGRES_USER" ]
      interval: 30s
      timeout: 10s
      retries: 5

  web:
    expose:
      - 8000
      - 443
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env.prod
    ports:
      - "8000:8000"
      - "443:443"
    volumes:
      - /etc/letsencrypt/live/osprey.work.gd/fullchain.pem:/etc/ssl/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/osprey.work.gd/privkey.pem:/etc/ssl/private/privkey.pem:ro
      - ./:/opt/money_manager_bot:ro
      - ./:/opt/money_manager_bot
    restart: always
    depends_on:
      - db
      - redis
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://0.0.0.0:443 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:6.0.7-alpine
    volumes:
      - ./redis:/data
    environment:
      - REDIS_BIND=127.0.0.1
    ports:
        - 127.0.0.1:${REDIS_PORT-6379}:6379
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres-data:
