version: "3.8"


services:
  db:
    image: postgres:12-alpine
    volumes:
      - postgres-data:/var/lib/postgresql/data:rw
    env_file:
      - .env.prod
    expose:
      - 5432
    ports:
      - ${POSTGRES_PORT-5432}:5432

  web:
    expose:
      - 8000
      - 443
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env.prod
    ports:
      - "8000:8000"
      - "443:443"
    volumes:
      - /etc/letsencrypt/live/example.com/fullchain.pem:/etc/ssl/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/example.com/privkey.pem:/etc/ssl/private/key.pem:ro
    depends_on:
      - db
      - redis

  redis:
    image: redis:6.0.7-alpine
    volumes:
      - ./redis:/data
    ports:
      - ${REDIS_PORT-6379}:6379

volumes:
  postgres-data:
